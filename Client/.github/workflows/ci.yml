name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        working-directory: Client
        run: npm ci

      - name: Lint
        working-directory: Client
        run: npm run lint

      - name: Type check
        working-directory: Client
        run: npx tsc --noEmit

      - name: Test
        working-directory: Client
        run: npm test

      - name: Build
        working-directory: Client
        run: npm run build